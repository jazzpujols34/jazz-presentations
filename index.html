<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz — Presentations</title>
    <meta name="description" content="Slide presentations archive by Jazz Lien. Projects, talks, and visual documentation.">

    <!-- Fonts: Syne (headings) + IBM Plex Mono (body/labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080c14;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(232, 213, 176, 0.18);
            --accent: #e8d5b0;
            --accent-interactive: #4fc3f7;
            --accent-glow: rgba(232, 213, 176, 0.08);
            --text: #dde6f0;
            --text-body: #8a9ab5;
            --text-muted: #3e4f68;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        ::selection {
            background: var(--accent);
            color: var(--bg);
        }

        body {
            background: var(--bg);
            color: var(--text-body);
            font-family: var(--font-mono);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle dot grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════ */
        .shell {
            position: relative;
            z-index: 1;
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px 64px;
        }

        /* ═══════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════ */
        header {
            padding: 72px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 48px;
        }

        .header-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }

        .site-id {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .site-title {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: clamp(1.4rem, 3.5vw, 1.9rem);
            letter-spacing: 0.15em;
            line-height: 1;
            color: var(--text);
            text-transform: uppercase;
        }

        .site-subtitle {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .signal {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding-bottom: 4px;
        }

        .signal-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 4s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }

        /* ═══════════════════════════════════════════
           SEARCH / COMMAND BAR
           ═══════════════════════════════════════════ */
        .cmd-bar {
            position: relative;
            margin-bottom: 40px;
        }

        .cmd-bar::before {
            content: '>';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 400;
            pointer-events: none;
        }

        .cmd-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 13px 16px 13px 34px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .cmd-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .cmd-input:focus {
            border-color: rgba(79, 195, 247, 0.25);
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.06);
        }

        /* ═══════════════════════════════════════════
           MASONRY GRID
           ═══════════════════════════════════════════ */
        .masonry {
            column-count: 3;
            column-gap: 18px;
        }

        @media (max-width: 900px) {
            .masonry { column-count: 2; }
        }

        @media (max-width: 560px) {
            .masonry { column-count: 1; }
        }

        /* ═══════════════════════════════════════════
           CARD
           ═══════════════════════════════════════════ */
        .card {
            break-inside: avoid;
            margin-bottom: 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
            cursor: crosshair;
            transition:
                transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.4s ease,
                box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--border-hover);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .card:hover .card-title {
            color: var(--accent);
        }

        /* Thumbnail */
        .card-thumb {
            width: 100%;
            display: block;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        /* Typographic placeholder */
        .card-typo {
            padding: 48px 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .card-typo::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(232, 213, 176, 0.02) 0%, transparent 50%);
        }

        .card-typo-text {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            letter-spacing: -0.02em;
            line-height: 0.95;
            color: rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 1;
            user-select: none;
        }

        /* Card body */
        .card-body {
            padding: 16px 18px 18px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-tag {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .card-index {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            font-weight: 300;
            color: rgba(79, 195, 247, 0.5);
            letter-spacing: 0.06em;
        }

        .card-title {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 7px;
            transition: color 0.3s ease;
        }

        .card-desc {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            font-weight: 300;
            line-height: 1.65;
            color: var(--text-body);
        }

        /* ═══════════════════════════════════════════
           EMPTY STATE
           ═══════════════════════════════════════════ */
        .empty-state {
            display: none;
            text-align: center;
            padding: 120px 24px;
        }

        .empty-state.visible {
            display: block;
        }

        .empty-state p {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }

        /* ═══════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════ */
        footer {
            margin-top: 80px;
            padding: 28px 0;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        footer p {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        footer a {
            color: var(--text-body);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--accent);
        }

        /* ═══════════════════════════════════════════
           ENTRANCE ANIMATIONS
           ═══════════════════════════════════════════ */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { animation: fade-up 0.7s ease-out both; }
        .cmd-bar { animation: fade-up 0.7s ease-out 0.08s both; }
        .card { animation: fade-up 0.6s ease-out both; }
        .card:nth-child(1) { animation-delay: 0.14s; }
        .card:nth-child(2) { animation-delay: 0.22s; }
        .card:nth-child(3) { animation-delay: 0.30s; }
        .card:nth-child(4) { animation-delay: 0.38s; }
        .card:nth-child(5) { animation-delay: 0.46s; }
        .card:nth-child(6) { animation-delay: 0.54s; }
        footer { animation: fade-up 0.6s ease-out 0.35s both; }

        /* ═══════════════════════════════════════════
           SCROLLBAR
           ═══════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>

<div class="shell">
    <header>
        <div class="header-row">
            <div class="site-id">
                <h1 class="site-title">Presentations</h1>
                <p class="site-subtitle">Archive &mdash; Jazz Lien</p>
            </div>
            <div class="signal">
                <span class="signal-dot"></span>
                <span id="count">1 entry</span>
            </div>
        </div>
    </header>

    <div class="cmd-bar">
        <input
            type="text"
            class="cmd-input"
            id="search"
            placeholder="filter by title or tag..."
            autocomplete="off"
            spellcheck="false"
        >
    </div>

    <div class="masonry" id="grid">

        <a class="card" href="decks/podsight.html" data-title="podsight" data-tag="product 2026">
            <img class="card-thumb" src="thumbnails/podsight.png" alt="PodSight presentation preview" loading="lazy">
            <div class="card-body">
                <div class="card-meta">
                    <span class="card-tag">Product &middot; 2026</span>
                    <span class="card-index">001</span>
                </div>
                <h2 class="card-title">PodSight</h2>
                <p class="card-desc">AI-powered podcast summarization pipeline. Transcribe, summarize, and publish&mdash;fully automated.</p>
            </div>
        </a>

        <!-- ═══ ADD NEW CARDS HERE ═══
        <a class="card" href="decks/your-file.html" data-title="title" data-tag="tag year">
            <img class="card-thumb" src="thumbnails/your-file.png" alt="Title preview" loading="lazy">
            <div class="card-body">
                <div class="card-meta">
                    <span class="card-tag">Tag &middot; Year</span>
                    <span class="card-index">002</span>
                </div>
                <h2 class="card-title">Title</h2>
                <p class="card-desc">Description goes here.</p>
            </div>
        </a>
        ═══════════════════════════ -->

    </div>

    <div class="empty-state" id="empty">
        <p>nothing here yet.</p>
    </div>

    <footer>
        <p>&copy; 2026 Jazz Lien</p>
        <p><a href="https://jazzlien.com">jazzlien.com</a></p>
    </footer>
</div>

<script>
    const search = document.getElementById('search');
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const countEl = document.getElementById('count');
    const cards = Array.from(grid.querySelectorAll('.card'));

    search.addEventListener('input', () => {
        const q = search.value.toLowerCase().trim();
        let visible = 0;

        cards.forEach(card => {
            const title = card.dataset.title || '';
            const tag = card.dataset.tag || '';
            const match = !q || title.includes(q) || tag.includes(q);
            card.style.display = match ? '' : 'none';
            if (match) visible++;
        });

        empty.classList.toggle('visible', visible === 0);
        countEl.textContent = visible === 1 ? '1 entry' : `${visible} entries`;
    });
</script>

</body>
</html>
